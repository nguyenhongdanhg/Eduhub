<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kế hoạch bài dạy · EduAI Hub</title>
  </head>
  <body
    data-page-title="Kế hoạch bài dạy"
    data-breadcrumb='[{"label":"Home","href":"/views/dashboard/index.html"},{"label":"Dạy học"},{"label":"Kế hoạch bài dạy"}]'
  >
    <div id="page-content">
      <div class="row">
        <div class="col-lg-5">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Tạo kế hoạch</h3>
            </div>
            <div class="card-body">
              <div class="mb-3">
                <label class="form-label">Tiêu đề</label>
                <input class="form-control" placeholder="Bài 12: ..." />
              </div>
              <div class="mb-3">
                <label class="form-label">Môn / Khối</label>
                <div class="row g-2">
                  <div class="col-7">
                    <input class="form-control" placeholder="Toán" />
                  </div>
                  <div class="col-5">
                    <input class="form-control" placeholder="10" />
                  </div>
                </div>
              </div>
              <button class="btn btn-outline-primary">
                <i class="fas fa-robot me-1"></i>Gợi ý bằng AI
              </button>
            </div>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Nội dung</h3>
            </div>
            <div class="card-body">
              <textarea class="form-control" rows="10" placeholder="Nội dung kế hoạch bài dạy..."></textarea>
              <div class="mt-3 d-flex gap-2">
                <button class="btn btn-primary">
                  <i class="fas fa-save me-1"></i>Lưu
                </button>
                <button class="btn btn-outline-secondary">Xem trước</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/bootstrap-page.js"></script>
  </body>
</html>
