services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://eduai:eduai@mariadb:3306/eduai_hub
    depends_on:
      - mariadb
      - qdrant
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: eduai_hub
      MARIADB_USER: eduai
      MARIADB_PASSWORD: eduai
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mariadb_data:
  qdrant_data: