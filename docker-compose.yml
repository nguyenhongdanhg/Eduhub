services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: eduai_hub
      MARIADB_USER: eduai
      MARIADB_PASSWORD: eduai
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mariadb_data:
  qdrant_data:
